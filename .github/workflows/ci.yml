name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================
  # JOB 1: Syntax & dependency check on every PR
  # ============================================
  lint-check:
    name: Lint & Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check syntax (safe mode)
        run: |
          files=(
            App.js
            supabase.js
            screens/LoginScreen.js
            screens/NewsScreen.js
            screens/AdminDashboardScreen.js
            screens/SubmitArticleScreen.js
            screens/ProfileScreen.js
            components/NewsCard.js
          )
      
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "Checking $file"
              npx --yes acorn --ecma2022 --module "$file" > /dev/null || exit 1
            else
              echo "$file not found, skipping"
            fi
          done
      
      - name: Run lint (if available)
        run: npm run lint --if-present

  # ============================================
  # JOB 2: EAS Preview Build — runs on main only
  # ============================================
  eas-build:
    name: EAS Android Preview Build
    runs-on: ubuntu-latest
    needs: lint-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (preview)
        run: eas build --platform android --profile preview --non-interactive

      - name: Comment build link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ EAS Build triggered. Check https://expo.dev for the APK download link.'
            })
