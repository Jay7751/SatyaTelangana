name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================
  # JOB 1: Syntax & dependency check on every PR
  # ============================================
  lint-check:
    name: Lint & Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for obvious syntax errors
        run: |
          npx --yes acorn --ecma2020 --module App.js > /dev/null && echo "App.js OK"
          npx --yes acorn --ecma2020 --module supabase.js > /dev/null && echo "supabase.js OK"
          npx --yes acorn --ecma2020 --module screens/LoginScreen.js > /dev/null && echo "LoginScreen.js OK"
          npx --yes acorn --ecma2020 --module screens/NewsScreen.js > /dev/null && echo "NewsScreen.js OK"
          npx --yes acorn --ecma2020 --module screens/AdminDashboardScreen.js > /dev/null && echo "AdminDashboardScreen.js OK"
          npx --yes acorn --ecma2020 --module screens/SubmitArticleScreen.js > /dev/null && echo "SubmitArticleScreen.js OK"
          npx --yes acorn --ecma2020 --module screens/ProfileScreen.js > /dev/null && echo "ProfileScreen.js OK"
          npx --yes acorn --ecma2020 --module components/NewsCard.js > /dev/null && echo "NewsCard.js OK"

  # ============================================
  # JOB 2: EAS Preview Build — runs on main only
  # ============================================
  eas-build:
    name: EAS Android Preview Build
    runs-on: ubuntu-latest
    needs: lint-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (preview)
        run: eas build --platform android --profile preview --non-interactive

      - name: Comment build link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ EAS Build triggered. Check https://expo.dev for the APK download link.'
            })
